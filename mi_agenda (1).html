<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Agenda">
<script>
// PWA Manifest inyectado inline para funcionar desde archivo local
(function(){
  const icon = `data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%230f0e17"/><text x="96" y="130" font-size="100" text-anchor="middle">◈</text></svg>')}`;
  const manifest = {
    name: "Mi Agenda",
    short_name: "Agenda",
    description: "Mi agenda semanal personal",
    start_url: window.location.href,
    display: "standalone",
    background_color: "#0f0e17",
    theme_color: "#0f0e17",
    orientation: "portrait",
    icons: [
      { src: icon, sizes: "192x192", type: "image/svg+xml" },
      { src: icon, sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.currentScript.parentNode.appendChild(link);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0e17;
  --bg2:#1a1826;
  --bg3:#231f35;
  --border:#2e2a45;
  --accent:#7c6af7;
  --accent2:#5edbc0;
  --accent3:#f7a26a;
  --accent4:#f76a8a;
  --accent5:#a8f76a;
  --text:#ede9fe;
  --text2:#9b93c4;
  --text3:#5e577a;
  --card:#1e1b2e;
  --radius:14px;
  --font:'Outfit',sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:680px;margin:0 auto;overflow-x:hidden}

/* ── HEADER ── */
.hdr{background:linear-gradient(180deg,var(--bg2) 0%,rgba(26,24,38,0) 100%);padding:16px 18px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{font-size:12px;color:var(--text3);font-family:var(--mono)}
.notif-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap}
.notif-btn:hover{border-color:var(--accent);color:var(--accent)}
.notif-btn.on{background:rgba(94,219,192,.12);border-color:var(--accent2);color:var(--accent2)}

/* ── DAY TABS ── */
.day-tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 18px;gap:6px;margin-bottom:4px}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 10px;border-radius:12px;border:1px solid transparent;background:none;cursor:pointer;min-width:56px;transition:all .2s;position:relative}
.dtab .dn{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;font-family:var(--font)}
.dtab .dd{font-size:16px;font-weight:700;color:var(--text2);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
.dtab.active{background:rgba(124,106,247,.12);border-color:rgba(124,106,247,.3)}
.dtab.active .dn{color:var(--accent)}
.dtab.active .dd{background:var(--accent);color:#fff}
.dtab.today .dd{box-shadow:0 0 0 2px var(--accent2)}
.dtab.today .dn{color:var(--accent2)}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:4px;opacity:0;transition:opacity .2s}
.dtab.has .tdot{opacity:1}

/* ── MAIN NAV ── */
.main-nav{display:flex;padding:0 18px;gap:4px;margin:8px 0 0}
.mnav{flex:1;padding:10px 6px;border:none;background:none;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;border-radius:10px;font-family:var(--font);transition:all .2s;text-align:center;letter-spacing:.3px}
.mnav.active{background:rgba(124,106,247,.15);color:var(--accent)}
.mnav:hover{color:var(--text)}

/* ── PAGES ── */
.pg{display:none;padding:14px 18px 90px}
.pg.show{display:block}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:rgba(124,106,247,.3)}
.card.now{border-color:var(--accent);box-shadow:0 0 0 1px rgba(124,106,247,.2),0 4px 20px rgba(124,106,247,.15)}
.card.done{opacity:.4}
.card.done .cname{text-decoration:line-through}
.card.clase-card{border-left:3px solid var(--accent3)}
.accent-bar{height:3px}
.card-head{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
.cico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cname{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.cright{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.pill{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.pill-now{background:rgba(124,106,247,.2);color:var(--accent);border:1px solid rgba(124,106,247,.4)}
.pill-done{background:rgba(94,219,192,.15);color:var(--accent2)}
.pill-notif{font-size:10px;color:var(--text3)}
.card-body{padding:0 14px 12px;border-top:1px solid var(--border)}
.card-body.hidden{display:none}
.steps{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:7px}
.steps li{display:flex;gap:10px;align-items:flex-start}
.snum{width:22px;height:22px;border-radius:50%;background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.25);color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-family:var(--mono)}
.stxt{font-size:13px;color:var(--text2);line-height:1.5}
.stxt b{color:var(--accent2)}
.cacts{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.ca{background:none;border:1px solid var(--border);color:var(--text3);font-size:12px;cursor:pointer;padding:5px 10px;border-radius:8px;transition:all .15s;font-family:var(--font)}
.ca:hover{border-color:var(--accent);color:var(--accent)}
.ca.red:hover{border-color:var(--accent4);color:var(--accent4)}

/* ── TIMELINE ── */
.tl-row{display:flex;gap:10px}
.tl-time{width:44px;flex-shrink:0;font-size:11px;color:var(--text3);font-weight:500;text-align:right;padding-top:16px;font-family:var(--mono)}
.tl-mid{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:16px}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:18px;flex-shrink:0;z-index:1}
.tl-line{width:2px;flex:1;min-height:12px;margin-bottom:0;opacity:.3}
.tl-right{flex:1;padding-bottom:8px}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
.stat-n{font-size:22px;font-weight:800;color:var(--accent);font-family:var(--mono)}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px}
.prog-box{background:var(--card);border-radius:12px;padding:12px 14px;border:1px solid var(--border);margin-bottom:12px}
.prog-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:7px}
.prog-row span:last-child{font-weight:700;color:var(--accent);font-family:var(--mono)}
.pbar{height:6px;background:var(--bg3);border-radius:10px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;transition:width .5s ease}
.day-head-card{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:var(--radius);padding:13px 15px;border:1px solid var(--border);margin-bottom:12px}
.dhc-left h2{font-size:17px;font-weight:800;color:var(--text);margin-bottom:2px}
.dhc-left p{font-size:11px;color:var(--text3)}
.chip{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.chip-ent{background:rgba(167,247,106,.1);color:var(--accent5);border:1px solid rgba(167,247,106,.2)}
.chip-ing{background:rgba(94,219,192,.1);color:var(--accent2);border:1px solid rgba(94,219,192,.2)}
.chip-lib{background:rgba(247,162,106,.1);color:var(--accent3);border:1px solid rgba(247,162,106,.2)}
.chip-pla{background:rgba(124,106,247,.1);color:var(--accent);border:1px solid rgba(124,106,247,.2)}
.add-btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:var(--font);font-weight:600;transition:all .2s}
.add-btn:hover{background:#6a59e8;transform:translateY(-1px)}
.alert{background:rgba(124,106,247,.08);border:1px solid rgba(124,106,247,.2);border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:13px;color:var(--text2)}

/* ── FOOD ── */
.kcal-hero{background:linear-gradient(135deg,var(--bg3),rgba(124,106,247,.2));border:1px solid rgba(124,106,247,.25);border-radius:16px;padding:18px;margin-bottom:12px}
.kh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.kh-consumed{font-size:38px;font-weight:800;color:var(--text);line-height:1;font-family:var(--mono)}
.kh-consumed span{font-size:14px;font-weight:400;color:var(--text3)}
.kh-label{font-size:12px;color:var(--text3);margin-top:3px}
.kh-remaining{background:rgba(94,219,192,.12);border:1px solid rgba(94,219,192,.2);border-radius:10px;padding:8px 12px;text-align:right}
.kh-rem-n{font-size:18px;font-weight:700;color:var(--accent2);font-family:var(--mono)}
.kh-rem-l{font-size:10px;color:var(--text3);margin-top:1px}
.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.macro{background:rgba(255,255,255,.04);border-radius:10px;padding:9px 10px;text-align:center}
.macro-val{font-size:17px;font-weight:700;font-family:var(--mono)}
.macro-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.macro-goal{font-size:10px;margin-top:1px}
.mbar{height:3px;background:rgba(255,255,255,.08);border-radius:4px;margin-top:6px;overflow:hidden}
.mbar-fill{height:100%;border-radius:4px;transition:width .3s}
.water-box{background:var(--card);border-radius:12px;padding:13px;border:1px solid var(--border);margin-bottom:12px}
.water-hd{display:flex;justify-content:space-between;font-size:13px;margin-bottom:10px}
.water-hd span:first-child{color:var(--text2);font-weight:500}
.water-hd span:last-child{color:var(--accent);font-weight:700;font-family:var(--mono)}
.wglasses{display:flex;gap:8px;flex-wrap:wrap}
.wg{font-size:24px;cursor:pointer;opacity:.2;filter:grayscale(1);transition:all .2s;user-select:none}
.wg.fill{opacity:1;filter:none}
.wg:hover{transform:scale(1.15)}
.meal-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 7px;font-family:var(--mono)}
.food-item{background:var(--card);border-radius:11px;padding:11px 13px;border:1px solid var(--border);margin-bottom:7px;display:flex;align-items:center;gap:11px}
.food-ico{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.food-info{flex:1;min-width:0}
.food-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.food-macros{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.food-kcal{font-size:15px;font-weight:700;color:var(--accent);font-family:var(--mono);flex-shrink:0}
.fdel{background:none;border:none;color:var(--border);cursor:pointer;font-size:16px;padding:2px 6px;transition:color .2s}
.fdel:hover{color:var(--accent4)}
.add-food-btn{width:100%;background:var(--bg3);border:1.5px dashed var(--border);color:var(--text2);padding:13px;border-radius:12px;font-size:14px;cursor:pointer;font-family:var(--font);font-weight:500;transition:all .2s;margin-top:4px}
.add-food-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,106,247,.06)}
.empty-state{text-align:center;padding:40px 20px}
.empty-state .emo{font-size:40px;margin-bottom:12px}
.empty-state p{color:var(--text3);font-size:14px}

/* ── HIGIENE ── */
.hyg-section{margin-bottom:14px}
.hyg-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-family:var(--mono);display:flex;align-items:center;gap:6px}
.hyg-title::after{content:'';flex:1;height:1px;background:var(--border)}
.hyg-card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.hyg-accent{height:3px}
.hyg-body{padding:13px}
.tip-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.tip-row:last-child{margin-bottom:0}
.tip-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px}
.tip-txt{font-size:13px;color:var(--text2);line-height:1.5}
.tip-txt b{color:var(--text);font-weight:600}
.tip-label{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

/* ── MODAL ── */
.mov{display:none;position:fixed;inset:0;background:rgba(15,14,23,.8);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.mov.show{display:flex}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;padding:20px 18px 36px;width:100%;max-width:680px;animation:sup .28s cubic-bezier(.16,1,.3,1);max-height:92vh;overflow-y:auto;border-top:1px solid var(--border)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:10px;margin:0 auto 20px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;font-weight:600;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;font-family:var(--mono)}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--font);outline:none;color:var(--text);transition:border .2s;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.5}
.fg select option{background:var(--bg2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.bpri{background:var(--accent);color:#fff;border:none;padding:13px;border-radius:12px;font-size:15px;cursor:pointer;font-family:var(--font);font-weight:600;transition:all .2s}
.bpri:hover{background:#6a59e8}
.bsec{background:var(--bg3);color:var(--text2);border:1px solid var(--border);padding:13px;border-radius:12px;font-size:15px;cursor:pointer;font-family:var(--font);font-weight:500}
.fsug-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.fsug{background:var(--bg3);color:var(--text2);border:1px solid var(--border);padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.fsug:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,106,247,.08)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <h1>◈ Mi Agenda</h1>
    <button class="notif-btn" id="notif-btn" onclick="reqNotif()">🔔 Activar avisos</button>
  </div>
  <div class="hdr-sub" id="clock-sub">cargando...</div>
</div>

<div class="day-tabs" id="day-tabs"></div>

<div class="main-nav">
  <button class="mnav active" onclick="switchMain('agenda',this)">📋 Agenda</button>
  <button class="mnav" onclick="switchMain('food',this)">🥗 Comida</button>
  <button class="mnav" onclick="switchMain('higiene',this)">🪥 Higiene</button>
</div>

<div class="pg show" id="pg-agenda"></div>
<div class="pg" id="pg-food"></div>
<div class="pg" id="pg-higiene"></div>

<!-- MODAL TAREA -->
<div class="mov" id="m-task" onclick="closeMov('m-task',event)">
  <div class="modal">
    <div class="mhandle"></div>
    <h3 id="mt-title">Nuevo bloque</h3>
    <div class="fg"><label>Nombre</label><input id="f-name" placeholder="Ej: Estudiar redes, Cardio..."></div>
    <div class="frow">
      <div class="fg"><label>Inicio</label><input type="time" id="f-start" value="15:00"></div>
      <div class="fg"><label>Fin</label><input type="time" id="f-end" value="16:00"></div>
    </div>
    <div class="fg"><label>Día</label><select id="f-day"></select></div>
    <div class="fg"><label>Pasos (uno por línea)</label><textarea id="f-notes" placeholder="Escribe los pasos o instrucciones, uno por línea..."></textarea></div>
    <div class="fg"><label>Emoji</label><input id="f-emoji" placeholder="💻 🏋️ 📚..." maxlength="4"></div>
    <div class="mbtns">
      <button class="bsec" onclick="document.getElementById('m-task').classList.remove('show')">Cancelar</button>
      <button class="bpri" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL COMIDA -->
<div class="mov" id="m-food" onclick="closeMov('m-food',event)">
  <div class="modal">
    <div class="mhandle"></div>
    <h3>Añadir alimento</h3>
    <div class="fg">
      <label>Nombre</label>
      <input id="ff-name" placeholder="Ej: Pollo plancha, Avena...">
      <div class="fsug-wrap">
        <button class="fsug" onclick="qf('Pollo plancha','🍗',165,31,0,4)">🍗 Pollo</button>
        <button class="fsug" onclick="qf('Arroz cocido','🍚',130,3,28,0)">🍚 Arroz</button>
        <button class="fsug" onclick="qf('Huevos ×2','🥚',148,12,1,10)">🥚 Huevos</button>
        <button class="fsug" onclick="qf('Avena 60g','🥣',220,8,38,4)">🥣 Avena</button>
        <button class="fsug" onclick="qf('Atún lata','🐟',120,26,0,1)">🐟 Atún</button>
        <button class="fsug" onclick="qf('Plátano','🍌',89,1,23,0)">🍌 Plátano</button>
        <button class="fsug" onclick="qf('Pasta cocida','🍝',160,6,31,1)">🍝 Pasta</button>
        <button class="fsug" onclick="qf('Leche 250ml','🥛',120,8,12,5)">🥛 Leche</button>
        <button class="fsug" onclick="qf('Almendras 30g','🌰',174,6,6,15)">🌰 Almendras</button>
        <button class="fsug" onclick="qf('Yogur griego','🫙',100,15,5,1)">🫙 Yogur</button>
        <button class="fsug" onclick="qf('Whey protein','🥤',120,24,3,2)">🥤 Proteína</button>
        <button class="fsug" onclick="qf('Salmón 150g','🐟',233,25,0,14)">🐟 Salmón</button>
        <button class="fsug" onclick="qf('Pan integral','🍞',130,5,24,2)">🍞 Pan integral</button>
        <button class="fsug" onclick="qf('Boniato 200g','🍠',172,3,40,0)">🍠 Boniato</button>
        <button class="fsug" onclick="qf('Mantequilla cacahuete','🥜',188,8,6,16)">🥜 ManteCacah.</button>

function initData(){
  if(Object.keys(S.tasks()).length) return;
  const out={};
  Object.entries(PLAN).forEach(([k,tasks])=>{out[k]=tasks.map(t=>({...t,done:false}));});
  S.setTasks(out);
}

// DAY TABS
// ═══════════════════════════════════════
function buildDayTabs(){
  const el=document.getElementById('day-tabs');
  const d=S.tasks();
  const today=realDay();
  const now=new Date();
  const dow=now.getDay();
  const sw=new Date(now);
  sw.setDate(now.getDate()+(dow===0?-6:1-dow));
  sw.setHours(0,0,0,0);
  el.innerHTML=DS.map((n,i)=>{
    const dt=new Date(sw);dt.setDate(sw.getDate()+i);
    const has=(d[i]||[]).length>0;
    return `<button class="dtab${i===curDay?' active':''}${has?' has':''}${i===today?' today':''}" onclick="goDay(${i})">
      <span class="dn">${n}</span>
      <span class="dd">${dt.getDate()}</span>
      <div class="tdot"></div>
    </button>`;
  }).join('');
}

function goDay(i){
  curDay=i;
  document.getElementById('f-day').value=i;
  buildDayTabs();
  if(curMain==='agenda') renderAgenda();
  else if(curMain==='food') renderFood();
}

function switchMain(tab,btn){
  curMain=tab;
  document.querySelectorAll('.mnav').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));
  document.getElementById('pg-'+tab).classList.add('show');
  if(tab==='agenda') renderAgenda();
  else if(tab==='food') renderFood();
  else renderHigiene();
}

// ═══════════════════════════════════════
// AGENDA
// ═══════════════════════════════════════
function chipData(i){
  if(i===0||i===2||i===4) return ['Entreno','chip-ent'];
  if(i===1||i===3) return ['Inglés','chip-ing'];
  if(i===5) return ['Descanso','chip-lib'];
  return ['Planificación','chip-pla'];
}

function renderAgenda(){
  const d=S.tasks();
  const tasks=(d[curDay]||[]).sort((a,b)=>t2m(a.start)-t2m(b.start));
  const now=nowMin(), today=realDay(), isToday=curDay===today;
  const done=tasks.filter(t=>t.done).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  const [chipTxt,chipCls]=chipData(curDay);

  let html='';
  if(isToday) html+=`<div class="alert">⚡ Hoy es ${DN[curDay]} — pulsa cualquier bloque para ver los pasos detallados</div>`;

  html+=`<div class="day-head-card">
    <div class="dhc-left">
      <h2>${DN[curDay]}</h2>
      <p>${curDay<5?'Clase 08:00–14:00 · ':''} ${chipTxt}</p>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <span class="chip ${chipCls}">${chipTxt}</span>
      <button class="add-btn" onclick="openTaskMod()">+ Añadir</button>
    </div>
  </div>`;

  html+=`<div class="stats-row">
    <div class="stat"><div class="stat-n">${tasks.length}</div><div class="stat-l">bloques</div></div>
    <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">completados</div></div>
    <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">progreso</div></div>
  </div>
  <div class="prog-box">
    <div class="prog-row"><span>Progreso del día</span><span>${pct}%</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  </div>`;

  if(!tasks.length){
    html+=`<div class="empty-state"><div class="emo">📭</div><p>Sin bloques para ${DN[curDay]}</p></div>`;
  } else {
    html+=tasks.map((t,idx)=>{
      const s=t2m(t.start),e=t2m(t.end);
      const isNow=isToday&&now>=s&&now<e;
      const isDone=t.done;
      const dur=e-s;
      const isLast=idx===tasks.length-1;
      const col=isDone?'#3a3550':t.color||'#7c6af7';
      const steps=t.notes?t.notes.split('\n').filter(x=>x.trim()):[];
      return `<div class="tl-row">
        <div class="tl-time">${t.start}</div>
        <div class="tl-mid">
          <div class="tl-dot" style="background:${col}"></div>
          ${!isLast?`<div class="tl-line" style="background:${col}"></div>`:''}
        </div>
        <div class="tl-right">
          <div class="card${isNow?' now':''}${isDone?' done':''}${t.clase?' clase-card':''}">
            <div class="accent-bar" style="background:${t.color||'#7c6af7'}"></div>
            <div class="card-head" onclick="toggleCB('cb-${t.id}')">
              <div class="cico" style="background:${t.color||'#7c6af7'}20">${t.emoji||'📌'}</div>
              <div class="cinfo">
                <div class="cname">${t.name}</div>
                <div class="cmeta">${t.start}–${t.end} · ${durFmt(dur)}</div>
              </div>
              <div class="cright">
                ${isNow?'<span class="pill pill-now">▶ AHORA</span>':''}
                ${isDone?'<span class="pill pill-done">✓ hecho</span>':''}
                ${!t.clase?'<span class="pill-notif">🔔</span>':''}
              </div>
            </div>
            <div class="card-body hidden" id="cb-${t.id}">
              ${steps.length?`<ul class="steps">${steps.map((s,i)=>`<li><span class="snum">${i+1}</span><span class="stxt">${s.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')}</span></li>`).join('')}</ul>`:''}
              <div class="cacts">
                <button class="ca" onclick="markDone('${t.id}')">${isDone?'↩️ Desmarcar':'✅ Hecho'}</button>
                <button class="ca" onclick="editTask('${t.id}')">✏️ Editar</button>
                <button class="ca red" onclick="delTask('${t.id}')">🗑️ Eliminar</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('pg-agenda').innerHTML=html;
}

function toggleCB(id){const el=document.getElementById(id);if(el)el.classList.toggle('hidden');}
function markDone(id){const d=S.tasks();const t=(d[curDay]||[]).find(x=>x.id===id);if(t)t.done=!t.done;S.setTasks(d);renderAgenda();}
function delTask(id){const d=S.tasks();d[curDay]=(d[curDay]||[]).filter(x=>x.id!==id);S.setTasks(d);buildDayTabs();renderAgenda();scheduleAll();}
function editTask(id){
  const d=S.tasks();const t=(d[curDay]||[]).find(x=>x.id===id);if(!t)return;
  editId=id;
  document.getElementById('f-name').value=t.name;
  document.getElementById('f-start').value=t.start;
  document.getElementById('f-end').value=t.end;
  document.getElementById('f-notes').value=t.notes||'';
  document.getElementById('f-emoji').value=t.emoji||'';
  document.getElementById('f-day').value=curDay;
  document.getElementById('mt-title').textContent='Editar bloque';
  document.getElementById('m-task').classList.add('show');
}
function openTaskMod(){
  editId=null;
  ['f-name','f-notes','f-emoji'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-start').value='15:00';
  document.getElementById('f-end').value='16:00';
  document.getElementById('f-day').value=curDay;
  document.getElementById('mt-title').textContent='Nuevo bloque';
  document.getElementById('m-task').classList.add('show');
}
function saveTask(){
  const name=document.getElementById('f-name').value.trim();
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const notes=document.getElementById('f-notes').value.trim();
  const emoji=document.getElementById('f-emoji').value.trim();
  const day=parseInt(document.getElementById('f-day').value);
  if(!name||!start||!end){alert('Rellena nombre y horario');return;}
  if(t2m(start)>=t2m(end)){alert('La hora fin debe ser después del inicio');return;}
  const d=S.tasks();if(!d[day])d[day]=[];
  const cols=['#7c6af7','#5edbc0','#f76a8a','#f7a26a','#a8f76a','#5e577a'];
  const col=cols[Math.floor(Math.random()*cols.length)];
  if(editId){
    const idx=d[curDay].findIndex(x=>x.id===editId);
    if(idx>-1)d[curDay][idx]={...d[curDay][idx],name,start,end,notes,emoji};
  } else {
    d[day].push({id:'u'+Date.now(),name,start,end,notes,emoji,color:col,done:false});
  }
  S.setTasks(d);
  document.getElementById('m-task').classList.remove('show');
  buildDayTabs();if(day===curDay)renderAgenda();scheduleAll();
}

function renderFood(){
  const key=foodKey();
  const foods=S.food()[key]||[];
  const wKey=`w_${todayStr()}`;
  const glasses=S.water()[wKey]||0;

  const totK=foods.reduce((s,f)=>s+(f.kcal||0),0);
  const totP=foods.reduce((s,f)=>s+(f.prot||0),0);
  const totC=foods.reduce((s,f)=>s+(f.carb||0),0);
  const totF=foods.reduce((s,f)=>s+(f.fat||0),0);
  const rem=KCAL_GOAL-totK;
  const pP=Math.min(100,Math.round(totP/PROT_GOAL*100));
  const pC=Math.min(100,Math.round(totC/CARB_GOAL*100));
  const pF2=Math.min(100,Math.round(totF/FAT_GOAL*100));

  let html=`<div style="font-size:11px;color:var(--text3);margin-bottom:10px;font-family:var(--mono)">📅 ${DN[curDay]} · objetivo ganar músculo · 65kg activo</div>`;

  html+=`<div class="kcal-hero">
    <div class="kh-top">
      <div>
        <div class="kh-consumed">${totK}<span> kcal</span></div>
        <div class="kh-label">consumidas hoy</div>
      </div>
      <div class="kh-remaining">
        <div class="kh-rem-n">${rem>0?rem:0}</div>
        <div class="kh-rem-l">${rem>0?'kcal restantes':'✓ objetivo!'}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">objetivo ${KCAL_GOAL} kcal</div>
      </div>
    </div>
    <div class="macros">
      <div class="macro">
        <div class="macro-val" style="color:#4ade80">${totP}g</div>
        <div class="macro-lbl">Proteína</div>
        <div class="macro-goal" style="color:var(--text3)">/ ${PROT_GOAL}g</div>
        <div class="mbar"><div class="mbar-fill" style="width:${pP}%;background:#4ade80"></div></div>
      </div>
      <div class="macro">
        <div class="macro-val" style="color:#facc15">${totC}g</div>
        <div class="macro-lbl">Carbos</div>
        <div class="macro-goal" style="color:var(--text3)">/ ${CARB_GOAL}g</div>
        <div class="mbar"><div class="mbar-fill" style="width:${pC}%;background:#facc15"></div></div>
      </div>
      <div class="macro">
        <div class="macro-val" style="color:#fb923c">${totF}g</div>
        <div class="macro-lbl">Grasa</div>
        <div class="macro-goal" style="color:var(--text3)">/ ${FAT_GOAL}g</div>
        <div class="mbar"><div class="mbar-fill" style="width:${pF2}%;background:#fb923c"></div></div>
      </div>
    </div>
  </div>`;

  html+=`<div class="water-box">
    <div class="water-hd">
      <span>💧 Agua</span>
      <span>${glasses}/8 vasos</span>
    </div>
    <div class="wglasses">
      ${[...Array(8)].map((_,i)=>`<span class="wg${i<glasses?' fill':''}" onclick="addWater(${i+1})">💧</span>`).join('')}
    </div>
  </div>`;

  const meals={};
  foods.forEach(f=>{if(!meals[f.meal])meals[f.meal]=[];meals[f.meal].push(f);});
  const mOrder=['Desayuno','Media mañana','Comida','Post-entreno','Merienda','Cena'];

  if(!foods.length){
    html+=`<div class="empty-state"><div class="emo">🍽️</div><p>Aún no registraste nada hoy</p></div>`;
  } else {
    mOrder.forEach(m=>{
      const items=meals[m];
      if(!items||!items.length) return;
      const mK=items.reduce((s,f)=>s+f.kcal,0);
      html+=`<div class="meal-section-title">${m} · ${mK} kcal</div>`;
      items.forEach(f=>{
        html+=`<div class="food-item">
          <div class="food-ico">${f.emoji||'🍽️'}</div>
          <div class="food-info">
            <div class="food-name">${f.name}</div>
            <div class="food-macros">P:${f.prot}g · C:${f.carb}g · G:${f.fat}g</div>
          </div>
          <div class="food-kcal">${f.kcal}</div>
          <button class="fdel" onclick="delFood('${f.id}')">✕</button>
        </div>`;
      });
    });
  }

  html+=`<button class="add-food-btn" onclick="document.getElementById('m-food').classList.add('show')">+ Añadir alimento</button>`;
  document.getElementById('pg-food').innerHTML=html;
}

function addWater(n){
  const k=`w_${todayStr()}`;
  const w=S.water();w[k]=n;S.setWater(w);renderFood();
}
function qf(name,emoji,kcal,prot,carb,fat){
  document.getElementById('ff-name').value=name;
  document.getElementById('ff-emoji').value=emoji;
  document.getElementById('ff-kcal').value=kcal;
  document.getElementById('ff-prot').value=prot;
  document.getElementById('ff-carb').value=carb;
  document.getElementById('ff-fat').value=fat;
}
function saveFood(){
  const name=document.getElementById('ff-name').value.trim();
  const emoji=document.getElementById('ff-emoji').value.trim();
  const meal=document.getElementById('ff-meal').value;
  const kcal=parseInt(document.getElementById('ff-kcal').value)||0;
  const prot=parseInt(document.getElementById('ff-prot').value)||0;
  const carb=parseInt(document.getElementById('ff-carb').value)||0;
  const fat=parseInt(document.getElementById('ff-fat').value)||0;
  if(!name){alert('Escribe el nombre del alimento');return;}
  const key=foodKey();
  const d=S.food();if(!d[key])d[key]=[];
  d[key].push({id:'f'+Date.now(),name,emoji,meal,kcal,prot,carb,fat});
  S.setFood(d);
  document.getElementById('m-food').classList.remove('show');
  renderFood();
}
function delFood(id){
  const key=foodKey();const d=S.food();
  if(d[key])d[key]=d[key].filter(f=>f.id!==id);
  S.setFood(d);renderFood();
}

// NOTIFICATIONS

async function reqNotif(){
  if(!('Notification' in window)){alert('Usa Chrome para notificaciones');return;}
  const p=await Notification.requestPermission();
  notifOn=p==='granted';
  const btn=document.getElementById('notif-btn');
  if(notifOn){btn.textContent='🔔 Activos';btn.classList.add('on');scheduleAll();new Notification('✅ Avisos activados',{body:'Te avisaré al inicio de cada bloque de la semana.'});}
}
function scheduleAll(){
  if(!notifOn) return;
  Object.values(timers).forEach(clearTimeout);timers={};
  const d=S.tasks();const now=new Date();const nowMs=now.getTime();
  const dow=now.getDay();const sw=new Date(now);
  sw.setDate(now.getDate()+(dow===0?-6:1-dow));sw.setHours(0,0,0,0);
  Object.entries(d).forEach(([di,tasks])=>{
    tasks.forEach(t=>{
      if(t.clase)return;
      const[hh,mm]=t.start.split(':').map(Number);
      const td=new Date(sw);td.setDate(sw.getDate()+parseInt(di));td.setHours(hh,mm,0,0);
      const ms=td.getTime()-nowMs;
      if(ms>0&&ms<7*24*60*60*1000){
        timers[t.id]=setTimeout(()=>{
          const steps=t.notes?t.notes.split('\n').filter(x=>x.trim()):[];
          new Notification(`${t.emoji||'⏰'} ${t.name}`,{body:steps[0]||`${t.start}–${t.end}`});
        },ms);
      }
    });
  });
}
